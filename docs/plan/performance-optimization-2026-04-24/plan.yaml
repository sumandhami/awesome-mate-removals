    title: Convert critical active-route hero and card images to optimized delivery
    description: |
      Implement critical image optimization conversion for hero and card images rendered on active routes only.
      Replace critical-path img usage with Next.js image optimization patterns where technically feasible,
      add responsive sizing hints, and ensure hero prioritization is applied only to above-the-fold media.
      Keep visual output unchanged aside from performance improvements.
    agent: gem-implementer
    priority: high
    status: completed
    dependencies: []
    context_files:
      - app/(main)/page.jsx: Identify homepage hero/card render entry points and image prop flow.
      - app/(main)/services/page.jsx: Validate service-route card image paths included in scope.
      - app/(main)/blog/how-to-move-heavy-furniture-without-damage/page.jsx: Validate in-scope article visual assets and card/related media references.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 220
    focus_area: critical image optimization
    verification:
      - Capture before/after Lighthouse mobile metrics for / with LCP comparison evidence.
      - Manually verify /, /services, and /blog/how-to-move-heavy-furniture-without-damage render images without breakage.
      - Run npm run build to confirm Next image integration compiles cleanly.
    acceptance_criteria:
      - Critical hero and card images on active routes use optimized Next.js image delivery where feasible.
      - Responsive sizing metadata is present for converted image instances.
      - No unrelated refactors, style rewrites, or non-active-route changes are included.
    rollback_note: |
      Revert only this image-conversion commit if visual regressions, CLS spikes, or broken media rendering are detected.
      Rollback trigger: significant LCP/CLS regression or broken hero/card rendering on active routes.
    failure_modes:
      - scenario: Improper sizing config introduces layout shift for card grids.
        likelihood: medium
        impact: high
        mitigation: Use explicit width/height or stable container dimensions and verify CLS on mobile before merge.
    tech_stack:
      - Next.js App Router
      - next/image
      - Lighthouse
    test_coverage: Route smoke checks plus before/after Lighthouse capture for active routes.

  - id: task-202
    title: Lazy load non-critical homepage sections via code-splitting
    description: |
      Introduce lazy loading/code-splitting for non-critical homepage sections only, scoped to /.
      Keep critical first-screen sections synchronous and defer below-the-fold modules using dynamic import boundaries.
      Ensure loading fallbacks are minimal and do not alter route semantics.
    agent: gem-implementer
    priority: high
    status: completed
    dependencies:
      - task-201
    context_files:
      - app/(main)/page.jsx: Add dynamic import boundaries for non-critical homepage sections.
      - src/PageViews/Home1/Home1.jsx: Confirm section ordering and critical vs non-critical split.
      - src/Componant1: Scope dynamic import targets to homepage-only non-critical sections.
    estimated_effort: medium
    estimated_files: 3
    estimated_lines: 180
    focus_area: homepage code-splitting
    verification:
      - Build and inspect route payload changes for / to confirm non-critical chunks are deferred.
      - Manually validate / first-screen content is complete without delayed critical UI.
      - Re-run Lighthouse mobile on / and compare TBT/INP-related improvements.
    acceptance_criteria:
      - Non-critical homepage sections are lazy loaded with clear code-splitting boundaries.
      - Above-the-fold homepage content remains immediately available without regression.
      - No unrelated refactors, style rewrites, or non-active-route changes are included.
    rollback_note: |
      Revert only the lazy-loading commit if deferred rendering causes UX regressions or hydration/runtime issues.
      Rollback trigger: broken first render, chunk load failures, or critical interaction delays on homepage.
    failure_modes:
      - scenario: Dynamic imports applied to critical sections degrade perceived load or cause hydration mismatch.
        likelihood: medium
        impact: medium
        mitigation: Keep hero/navbar/primary CTA synchronous and limit lazy boundaries to below-the-fold modules.
    tech_stack:
      - Next.js dynamic import
      - React Suspense/lazy boundaries
      - Lighthouse
    test_coverage: Manual homepage first-screen regression checks and route performance comparison.

