plan_id: performance-optimization-2026-04-24
objective: Phase 2 performance optimization for active routes only
created_at: 2026-04-24T00:00:00Z
created_by: gem-planner (GPT-5.3-Codex)
status: completed
research_confidence: high

tldr: |
  Execute Phase 2 as three narrow, commit-sized optimizations limited to the active routes only:
  /, /services, and /blog/how-to-move-heavy-furniture-without-damage.
  Sequence is image optimization first, then homepage lazy loading/code-splitting,
  then JS/import overhead trimming for active-route components.
  No unrelated refactors are permitted in any task.
open_questions:
  - Should route-level Lighthouse acceptance be enforced on local only or local plus preview deployment for this phase gate?

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: Hero/card image conversion causes layout shift or above-the-fold rendering delay on mobile.
      likelihood: medium
      impact: high
      mitigation: Preserve explicit dimensions or fill container constraints, set priority only for true hero image, and verify CLS/LCP before merge.
    - scenario: Lazy loading non-critical homepage sections defers content that is still needed for initial UX expectations.
      likelihood: medium
      impact: medium
      mitigation: Limit lazy loading to below-the-fold sections, keep critical above-the-fold modules synchronous, and validate first-screen completeness.
    - scenario: JS/import trimming removes modules with hidden side effects and breaks route rendering.
      likelihood: low
      impact: medium
      mitigation: Restrict removals to obvious unused imports and dead route-local code paths, then run build and active-route smoke checks.
  assumptions:
    - Active route scope for this phase remains strictly: /, /services, /blog/how-to-move-heavy-furniture-without-damage.
    - Prior security and routing phase outputs are already merged and stable.
    - This plan is delivery-focused and excludes visual redesign or content rewrites.

implementation_specification:
  code_structure: Keep existing App Router and src composition architecture; implement minimal performance changes only in active-route entry composition and route-impacting components, with no unrelated refactors.
  affected_areas:
    - app/(main)/page.jsx
    - app/(main)/services/page.jsx
    - app/(main)/blog/how-to-move-heavy-furniture-without-damage/page.jsx
    - src/Componant1
    - src/PageViews/Home1/Home1.jsx
    - public/images
  component_details:
    - component: Active-route hero and card imagery
      responsibility: Convert critical active-route hero/card image rendering to Next.js optimized delivery with responsive sizing and modern formats where feasible.
      interfaces:
        - Homepage hero image render path
        - Homepage/services/blog card image render paths used by active routes
    - component: Homepage non-critical section loading
      responsibility: Defer non-critical homepage sections with dynamic imports/lazy boundaries to reduce initial JS and improve interactivity.
      interfaces:
        - app/(main)/page.jsx section composition chain
        - Home1 section exports consumed above and below the fold
    - component: Active-route JS/import overhead
      responsibility: Remove obvious unused imports and dead route-local JS overhead in components rendered on the three active routes.
      interfaces:
        - Route-level component import lists
        - Active-route composition trees and shared dependencies
  dependencies:
    - component: Homepage non-critical section loading
      relationship: Depends on image optimization baseline so performance attribution is isolated by optimization class.
    - component: Active-route JS/import overhead
      relationship: Depends on lazy-loading changes to avoid duplicate churn and to finalize payload trimming after split boundaries are in place.
  integration_points:
    - app/(main)/page.jsx homepage composition and section-loading behavior
    - Active-route card components under src/Componant1 rendered from homepage/services/blog flows
    - Route-level imports and render trees used by /, /services, and the active blog detail route

tasks:
