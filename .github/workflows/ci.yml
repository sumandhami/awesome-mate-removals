name: CI

on:
  push:
    branches:
      - main
      - tests/nextjs
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm run audit

      - name: Lighthouse gate
        run: npm run lhci
